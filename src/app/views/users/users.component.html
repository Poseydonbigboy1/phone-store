<!-- <h1>Users</h1> -->
<p-table [value]="(users$ | async) ?? []" dataKey="id" editMode="row" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
        <tr>
            <th style="width:22%">Id</th>
            <th style="width:22%">Имя</th>
            <th style="width:22%">Логин</th>
            <th style="width:22%">Пароль</th>
            <th style="width:12%"></th>
        </tr>
    </ng-template>
    <ng-template #body let-user let-editing="editing" let-ri="rowIndex">
        <tr [pEditableRow]="user">
            <td>
                <p-cellEditor>
                    <ng-template #input>
                        {{ user.id }}
                    </ng-template>
                    <ng-template #output>
                        {{ user.id }}
                    </ng-template>
                </p-cellEditor>
            </td>
            <td>
                <p-cellEditor>
                    <ng-template #input>
                        <input pInputText type="text" [(ngModel)]="user.name" />
                    </ng-template>
                    <ng-template #output>
                        {{ user.name }}
                    </ng-template>
                </p-cellEditor>
            </td>
            <td>
                <p-cellEditor>
                    <ng-template #input>
                        <input pInputText type="text" [(ngModel)]="user.login" required />
                    </ng-template>
                    <ng-template #output>
                        {{ user.login }}
                    </ng-template>
                </p-cellEditor>
            </td>
            <td>
                 <p-cellEditor>
                    <ng-template #input>
                        <input pInputText type="text" [(ngModel)]="user.password" required />
                    </ng-template>
                    <ng-template #output>
                        {{ user.password }}
                    </ng-template>
                </p-cellEditor>
            </td>
            <td>
                <div class="flex items-center justify-center gap-2">
                    <button *ngIf="!editing" pButton pRipple type="button" pInitEditableRow icon="pi pi-pencil"
                        (click)="onRowEditInit(user)" text rounded severity="secondary"></button>
                    <button *ngIf="editing" pButton pRipple type="button" pSaveEditableRow icon="pi pi-check"
                        (click)="onRowEditSave(user)" text rounded severity="secondary"></button>
                    <button *ngIf="editing" pButton pRipple type="button" pCancelEditableRow icon="pi pi-times"
                        (click)="onRowEditCancel(user, ri)" text rounded severity="secondary"></button>
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>
