<div class="flex flex-column gap-3">
  <div class="flex align-items-center gap-4">
    <div class="flex-1 flex align-items-center gap-2">
      <label class="p-text-secondary text-sm range-label">от</label>
      <p-inputNumber
        [ngModel]="item.value[0]"
        (ngModelChange)="onModelChange($event, 0)"
        [min]="min"
        [max]="item.value?.[1] || max"
        [showButtons]="false"
        inputStyleClass="w-full text-right p-inputtext-sm"
      />
    </div>

    <div class="flex-1 flex align-items-center gap-2">
      <label class="p-text-secondary text-sm range-label">до</label>
      <p-inputNumber
        [ngModel]="item.value[1]"
        (ngModelChange)="onModelChange($event, 1)"
        [min]="item.value?.[0] || min"
        [max]="max"
        [showButtons]="false"
        inputStyleClass="w-full text-right p-inputtext-sm"
      />
    </div>
  </div>

  <p-slider
    [(ngModel)]="item.value"
    (ngModelChange)="onModelChangeSlider()"
    [range]="true"
    [min]="min"
    [max]="max"
    styleClass="w-full mt-1"
  />
</div>
