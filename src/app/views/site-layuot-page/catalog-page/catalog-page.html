<div class="grid">
  <div class="col-3">
    <app-catalog-filter></app-catalog-filter>
  </div>
  <div class="col flex flex-column" [style]="{ height: 'calc(100vh - 140px)' }">
    <div class="card">
      <p-dataview [value]="(products$ | async) ?? []" layout="grid" [loading]="isLoading$ | async">
        <ng-template #grid let-items>
          <p-scrollpanel [style]="{ width: '100%', height: 'calc(100vh - 140px - 56px)' }">
            <div class="grid">
              @for (product of items; track $index) {
                <div class="col-3 bg-white">
                  <p-card>
                    <ng-template pTemplate="header">
                      <img alt="Card" class="w-full" [src]="product.images[0]" />
                    </ng-template>
                    <ng-template pTemplate="title"> {{ product.title }} </ng-template>

                    <ng-template pTemplate="footer">
                      <div class="flex justify-content-between align-items-center mt-3">
                        <div class="col">
                          <span>{{ product.price | currency }}</span>
                        </div>
                      </div>
                      <p-rating [ngModel]="product.rating" [stars]="5" />
                      <p-button severity="success" aria-label="Save" (click)="addToCart(product)">
                        <span class="pi pi-cart-plus text-xl"></span>
                      </p-button>
                    </ng-template>
                  </p-card>
                </div>
              }
            </div>
          </p-scrollpanel>
        </ng-template>
      </p-dataview>
    </div>
    <div class="card flex justify-content-center bg-white mt-auto">
      <p-paginator
        (onPageChange)="onPageChange($event)"
        [first]="(skip$ | async) ?? 0"
        [rows]="take$ | async"
        [totalRecords]="(total$ | async) ?? 0"
      />
    </div>
  </div>
</div>
