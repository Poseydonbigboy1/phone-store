<div class="flex flex-column h-screen overflow-hidden">
  
  <header id="menu" class="flex-none h-100px bg-primary shadow-2 z-5">
    <p-menubar [model]="menuItems" styleClass="border-none bg-primary h-full">
      <ng-template pTemplate="end">
        <div class="flex align-items-center gap-3">
          @if (user$ | async; as user) {
            <span class="white-space-nowrap overflow-hidden text-overflow-ellipsis text-white font-medium" 
                  style="max-width: 100px;">
              {{ user?.login }}
            </span>
          }
        </div>
      </ng-template>
    </p-menubar>
  </header>

  <main id="content" class="flex-grow-1 overflow-y-auto p-3 bg-gray-50">
    <div class="container mx-auto">
      <router-outlet></router-outlet>
    </div>
  </main>

  <footer id="footer" class="flex-none h-75px bg-gray-900 text-white flex align-items-center justify-content-center">
    <p>© 2026 Магазин DirektorTanka. Все права защищены.</p>
  </footer>

</div>
