<div class="flex flex-column h-screen overflow-hidden" style="background-color: #0b0612">
  <header
    id="menu"
    class="flex-none h-100px shadow-4 z-5"
    style="background-color: #303030; border-bottom: 1px solid #2d243d"
  >
    <p-menubar [model]="menuItems" class="border-none h-full surface-800">
      <ng-template pTemplate="end">
        <div class="flex align-items-center gap-3">
          <!-- Поиск -->
          <span class="p-input-icon-right" style="position:relative">
            <i class="pi pi-search" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none"></i>
            <input
              pInputText
              [(ngModel)]="searchQuery"
              placeholder="Поиск товаров..."
              style="padding-right:2.5rem; width:220px; background:#424242; color:#fff; border-color:#555"
              (keydown.enter)="onSearch()"
            />
          </span>

          @if (user$ | async; as user) {
            <!-- Иконка корзины с бейджем -->
            <p-overlaybadge
              [value]="(cartCount$ | async) || null"
              severity="danger"
            >
              <p-button
                icon="pi pi-shopping-cart"
                [rounded]="true"
                [text]="true"
                severity="secondary"
                (onClick)="goToCart()"
              />
            </p-overlaybadge>

            <span
              class="white-space-nowrap overflow-hidden text-overflow-ellipsis font-medium"
              style="max-width: 100px; color: #ffffff"
            >
              {{ user?.login }}
            </span>
          }
        </div>
      </ng-template>
    </p-menubar>
  </header>

  <main id="content" class="flex-grow-1 overflow-y-auto p-3 bg-white">
    <div class="container mx-auto">
      <router-outlet></router-outlet>
    </div>
  </main>

  <footer
    id="footer"
    class="flex-none h-75px flex align-items-center justify-content-center"
    style="background-color: #303030; border-top: 1px solid #2d243d; color: #ffffff"
  >
    <p>© 2026 Магазин PhoneStore. Все права защищены.</p>
  </footer>
</div>
