<div class="layout-wrapper" [class.layout-mobile-active]="sidebarVisible">

  <!-- ───── Topbar ───── -->
  <div class="layout-topbar">
    <div class="layout-topbar-logo-container">
      <button class="layout-menu-button" (click)="toggleSidebar()">
        <i class="pi pi-bars"></i>
      </button>
      <a routerLink="/manager" class="layout-topbar-logo">
        <i class="pi pi-fw pi-mobile"></i>
        <span>PhoneStore</span>
      </a>
    </div>

    <div class="layout-topbar-title" *ngIf="currentPageTitle">
      <span class="layout-topbar-title-separator"></span>
      <span class="layout-topbar-title-text">{{ currentPageTitle }}</span>
    </div>

    <div class="layout-topbar-actions">
      <p-avatar icon="pi pi-user" shape="circle" />
    </div>
  </div>

  <!-- ───── Sidebar ───── -->
  <div class="layout-sidebar">
    <ul class="layout-menu">
      <li class="layout-root-menuitem">
        <div class="layout-menuitem-root-text">Справочники</div>
        <ul>
          <li>
            <a routerLink="directories/brands"
               routerLinkActive="active-route"
               pRipple>
              <i class="pi pi-fw pi-tag layout-menuitem-icon"></i>
              <span>Бренды</span>
            </a>
          </li>
          <li>
            <a routerLink="directories/categories"
               routerLinkActive="active-route"
               pRipple>
              <i class="pi pi-fw pi-tags layout-menuitem-icon"></i>
              <span>Категории</span>
            </a>
          </li>
        </ul>
      </li>
    </ul>
  </div>

  <!-- Mobile overlay -->
  <div class="layout-mask" *ngIf="sidebarVisible" (click)="toggleSidebar()"></div>

  <!-- ───── Main ───── -->
  <div class="layout-main-container">
    <div class="layout-main">

      <p-breadcrumb
        [model]="breadcrumbItems"
        [home]="home"
        styleClass="layout-breadcrumb"
      />

      <div class="layout-main-content">
        <router-outlet />
      </div>

    </div>
  </div>

</div>
