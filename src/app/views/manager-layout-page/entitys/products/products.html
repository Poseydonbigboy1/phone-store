<div class="flex flex-column h-full">
  <p-confirmDialog appendTo="body" />
  <div class="card flex-1 flex flex-column" style="min-height: 0">
    <p-toolbar styleClass="mb-4">
      <ng-template pTemplate="start">
        <div class="flex gap-2">
          <p-button label="Добавить" icon="pi pi-plus" severity="secondary" (onClick)="showAddForm()" />
          <p-button label="Фильтр" icon="pi pi-filter" severity="secondary" [outlined]="true" (onClick)="displayFilter = true" />
        </div>
      </ng-template>
      <ng-template pTemplate="end">
        <div class="flex flex-wrap gap-2">
          <p-tag *ngFor="let f of appliedFilters" [value]="f.key + ': ' + f.value" icon="pi pi-times"
            severity="secondary" styleClass="cursor-pointer" (click)="removeFilter(f.key)" />
        </div>
      </ng-template>
    </p-toolbar>
    <div class="flex-1" style="min-height: 0; overflow: hidden">
      <p-table [value]="(items$ | async) ?? []" [loading]="(loading$ | async) ?? false"
        [rowHover]="true" [scrollable]="true" scrollHeight="flex">
        <ng-template pTemplate="header">
          <tr><th>Название</th><th>Описание</th><th>ID бренда</th><th style="width: 8rem"></th></tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
          <tr>
            <td>{{ item.title }}</td>
            <td>{{ item.description }}</td>
            <td class="text-sm text-color-secondary">{{ item.brandId }}</td>
            <td>
              <p-button icon="pi pi-pencil" [rounded]="true" [outlined]="true" size="small" class="mr-2" (onClick)="showEditForm(item)" />
              <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" size="small" (onClick)="delete(item.id)" />
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr><td colspan="4" class="text-center py-6"><i class="pi pi-inbox text-4xl text-color-secondary block mb-3"></i><span class="text-color-secondary">Нет данных</span></td></tr>
        </ng-template>
      </p-table>
    </div>
    <p-paginator [rows]="paginatorState.rows!" [totalRecords]="(total$ | async) ?? 0" [first]="paginatorState.first!"
      (onPageChange)="onPageChange($event)" [rowsPerPageOptions]="[10, 20, 50]"
      [showCurrentPageReport]="true" currentPageReportTemplate="{first}–{last} из {totalRecords}" />
  </div>
</div>

<p-drawer [(visible)]="displayForm" position="right" appendTo="body" [style]="{ width: '32rem' }">
  <ng-template pTemplate="header"><span class="font-semibold text-lg">{{ isEditMode ? 'Редактировать' : 'Добавить' }}</span></ng-template>
  <form [formGroup]="form" (ngSubmit)="onFormSubmit()" class="flex flex-column gap-4 pt-2">
    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Название *</label>
      <input pInputText formControlName="title" placeholder="Название продукта..." />
    </div>
    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Описание</label>
      <input pInputText formControlName="description" placeholder="Описание..." />
    </div>
    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">ID бренда *</label>
      <input pInputText formControlName="brandId" placeholder="UUID бренда..." />
    </div>
    <div class="flex gap-2 justify-content-end mt-auto">
      <p-button label="Отмена" severity="secondary" [outlined]="true" (onClick)="displayForm = false" />
      <p-button [label]="isEditMode ? 'Сохранить' : 'Добавить'" type="submit" severity="success" [disabled]="form.invalid" />
    </div>
  </form>
</p-drawer>

<p-drawer [(visible)]="displayFilter" position="right" appendTo="body" [style]="{ width: '24rem' }">
  <ng-template pTemplate="header"><span class="font-semibold text-lg">Фильтр</span></ng-template>
  <form [formGroup]="filterForm" (ngSubmit)="applyFilters()" class="flex flex-column gap-4 pt-2">
    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Название</label>
      <input pInputText formControlName="title" placeholder="Фильтр по названию..." />
    </div>
    <div class="flex gap-2 justify-content-end mt-auto">
      <p-button label="Сбросить" severity="secondary" [outlined]="true" type="button" (onClick)="filterForm.reset(); applyFilters()" />
      <p-button label="Применить" type="submit" />
    </div>
  </form>
</p-drawer>
